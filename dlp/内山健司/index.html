<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プランナー実績 - 房総FAS</title>
<script>
var link = document.createElement('link');
link.rel = 'stylesheet';
link.href = 'https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Quicksand:wght@400;500;600;700&display=swap';
document.head.appendChild(link);
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "Zen Maru Gothic", "Hiragino Maru Gothic ProN", sans-serif;
    background: linear-gradient(180deg, #f0f4ff 0%, #e8edf8 40%, #f3eef6 100%);
    background-attachment: fixed;
    color: #3a4060; line-height: 1.6; min-height: 100vh;
}
.container { max-width: 900px; margin: 0 auto; padding: 20px; }

.back-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: #4a7cc9; text-decoration: none; font-size: 14px;
    margin-bottom: 16px; padding: 6px 14px;
    background: rgba(255,255,255,0.7); border-radius: 20px;
    transition: all 0.2s;
}
.back-link:hover { background: rgba(74, 124, 201, 0.1); }

.profile-header {
    background: linear-gradient(135deg, #4a7cc9 0%, #6b5ea6 40%, #8b6eae 100%);
    color: white; padding: 30px; border-radius: 20px;
    margin-bottom: 20px; display: flex; align-items: center; gap: 24px;
    box-shadow: 0 6px 24px rgba(74, 124, 201, 0.25);
    position: relative; overflow: hidden;
}
.profile-header::before {
    content: ''; position: absolute;
    top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 50%);
    pointer-events: none;
}
.profile-avatar {
    width: 80px; height: 80px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 700; flex-shrink: 0;
    position: relative;
}
.profile-info { position: relative; }
.profile-info h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
.profile-info .base-name { font-size: 14px; opacity: 0.85; }
.profile-info .badges { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.profile-info .badge {
    font-size: 11px; padding: 3px 10px;
    background: rgba(255,255,255,0.2); border-radius: 12px;
}

.loading {
    text-align: center; padding: 60px; color: #8a90a8; font-size: 15px;
}
.loading .spinner {
    width: 36px; height: 36px; border: 3px solid rgba(74,124,201,0.2);
    border-top-color: #4a7cc9; border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.tab-bar {
    display: flex; gap: 4px; margin-bottom: 16px;
    background: rgba(255,255,255,0.6); padding: 4px;
    border-radius: 14px; flex-wrap: wrap;
}
.tab-btn {
    padding: 10px 18px; border: none; border-radius: 12px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    font-family: "Zen Maru Gothic", sans-serif;
    background: transparent; color: #6a7090;
    transition: all 0.2s; white-space: nowrap;
}
.tab-btn:hover { background: rgba(255,255,255,0.5); }
.tab-btn.active { background: white; color: #4a7cc9; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

.section { display: none; }
.section.active { display: block; }

.data-card {
    background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
    border-radius: 16px; padding: 20px;
    margin-bottom: 14px;
    border: 1px solid rgba(180, 190, 220, 0.25);
    box-shadow: 0 2px 10px rgba(100, 120, 180, 0.06);
}
.data-card h3 {
    font-size: 14px; color: #4a6090; margin-bottom: 14px;
    padding-bottom: 8px; border-bottom: 2px solid rgba(74, 124, 201, 0.15);
}

.data-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
}
.data-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px; background: rgba(240, 244, 255, 0.6);
    border-radius: 10px;
}
.data-item .label { font-size: 12px; color: #6a7090; }
.data-item .value { font-size: 18px; font-weight: 700; color: #4a7cc9; }
.data-item .value.zero { color: #c0c8d8; }

.edit-mode .data-item .value { display: none; }
.edit-mode .data-item .edit-input { display: block; }
.data-item .edit-input {
    display: none; width: 70px; padding: 4px 8px;
    border: 2px solid #4a7cc9; border-radius: 8px;
    font-size: 16px; font-weight: 700; color: #4a7cc9;
    text-align: right; font-family: "Zen Maru Gothic", sans-serif;
    outline: none;
}

.action-bar {
    display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
}
.btn {
    padding: 10px 22px; border: none; border-radius: 12px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: "Zen Maru Gothic", sans-serif;
    transition: all 0.2s;
}
.btn-primary { background: #4a7cc9; color: white; }
.btn-primary:hover { background: #3a6ab5; }
.btn-danger { background: rgba(201, 74, 90, 0.1); color: #c94a5a; }
.btn-danger:hover { background: rgba(201, 74, 90, 0.2); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.save-msg {
    padding: 12px 18px; border-radius: 12px; margin-bottom: 14px;
    font-size: 13px; display: none;
}
.save-msg.ok { display: block; background: rgba(74,156,124,0.12); color: #2a7a5a; }
.save-msg.err { display: block; background: rgba(201,74,90,0.12); color: #c94a5a; }

.empty-msg { text-align: center; padding: 40px; color: #a0a8c0; font-size: 14px; }

/* 履歴 */
.history-group { margin-bottom: 16px; }
.history-date {
    padding: 10px 16px; cursor: pointer;
    background: linear-gradient(135deg, #4a7cc9, #6b5ea6);
    color: white; border-radius: 12px; font-weight: 600; font-size: 14px;
    display: flex; justify-content: space-between; align-items: center;
}
.history-date:hover { opacity: 0.9; }
.history-date .arrow { transition: transform 0.2s; }
.history-date.open .arrow { transform: rotate(90deg); }
.history-items { display: none; padding: 8px 0 0; }
.history-items.open { display: block; }
.history-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px; font-size: 13px;
    background: rgba(255,255,255,0.9); border-radius: 10px;
    margin-bottom: 4px; border: 1px solid rgba(180,190,220,0.2);
}
.history-row .h-item { flex: 1; color: #4a6090; font-weight: 500; }
.history-row .h-old { color: #999; min-width: 50px; text-align: right; }
.history-row .h-arrow { color: #6b5ea6; font-weight: bold; }
.history-row .h-new { color: #4a7cc9; font-weight: 700; min-width: 50px; text-align: right; }
.history-empty { text-align: center; padding: 30px; color: #a0a8c0; font-size: 14px; }

/* 計画生産シート */
.plan-upload-box {
    background: rgba(240, 244, 255, 0.6);
    border: 2px dashed rgba(74, 124, 201, 0.35);
    border-radius: 14px; padding: 18px; margin-bottom: 16px;
}
.plan-upload-box .plan-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.plan-title-input {
    flex: 1; min-width: 200px;
    padding: 10px 14px; border: 2px solid rgba(74, 124, 201, 0.25);
    border-radius: 10px; font-size: 14px; color: #3a4060;
    font-family: "Zen Maru Gothic", sans-serif; background: white; outline: none;
    transition: border-color 0.2s;
}
.plan-title-input:focus { border-color: #4a7cc9; }
.plan-file-input { display: none; }
.plan-file-label {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 16px; background: white;
    border: 2px solid rgba(74, 124, 201, 0.25); border-radius: 10px;
    font-size: 13px; color: #4a7cc9; cursor: pointer; font-weight: 500;
    transition: all 0.2s;
}
.plan-file-label:hover { background: rgba(74, 124, 201, 0.08); border-color: #4a7cc9; }
.plan-file-name { font-size: 12px; color: #6a7090; margin-left: 4px; align-self: center; }
.plan-upload-hint { font-size: 11px; color: #8a90a8; margin-top: 4px; }

.plan-card {
    background: white; border-radius: 16px; padding: 18px;
    margin-bottom: 12px; border: 1px solid rgba(180, 190, 220, 0.25);
    box-shadow: 0 2px 10px rgba(100, 120, 180, 0.06);
}
.plan-card-title {
    font-size: 18px; font-weight: 700; color: #3a4060;
    margin-bottom: 6px; line-height: 1.4;
    padding-bottom: 8px; border-bottom: 2px solid rgba(74, 124, 201, 0.15);
}
.plan-card-meta {
    font-size: 12px; color: #8a90a8; margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
}
.plan-card-body { text-align: center; }
.plan-card-img {
    max-width: 100%; max-height: 400px; border-radius: 10px;
    border: 1px solid rgba(180, 190, 220, 0.3); cursor: pointer;
    transition: transform 0.2s;
}
.plan-card-img:hover { transform: scale(1.02); }
.plan-card-pdf {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 22px; background: rgba(201, 90, 74, 0.08);
    border: 1px solid rgba(201, 90, 74, 0.2); border-radius: 12px;
    color: #b04a3a; text-decoration: none; font-weight: 600; font-size: 14px;
    transition: all 0.2s;
}
.plan-card-pdf:hover { background: rgba(201, 90, 74, 0.15); }
.plan-card-pdf .pdf-icon { font-size: 22px; }
.plan-card-delete {
    margin-top: 10px; padding: 6px 14px; font-size: 12px;
    background: rgba(201, 74, 90, 0.08); color: #c94a5a;
    border: none; border-radius: 8px; cursor: pointer;
    font-family: "Zen Maru Gothic", sans-serif; transition: background 0.2s;
}
.plan-card-delete:hover { background: rgba(201, 74, 90, 0.2); }
.plan-empty { text-align: center; padding: 40px 20px; color: #a0a8c0; font-size: 14px; }
.plan-progress {
    padding: 14px; background: rgba(74, 124, 201, 0.08);
    border-radius: 10px; color: #4a7cc9; font-size: 13px;
    text-align: center; margin-bottom: 14px; display: none;
}
.plan-progress.show { display: block; }

@media (max-width: 768px) {
    .container { padding: 12px; }
    .profile-header { flex-direction: column; text-align: center; padding: 20px 16px; }
    .profile-info h1 { font-size: 20px; }
    .profile-avatar { width: 64px; height: 64px; font-size: 24px; }
    .tab-bar { gap: 2px; padding: 3px; border-radius: 12px; flex-wrap: wrap; }
    .tab-btn { padding: 7px 8px; font-size: 11px; border-radius: 10px; flex: 1 1 auto; }
    .data-grid { grid-template-columns: 1fr; gap: 6px; }
    .data-item { padding: 10px 14px; }
    .data-item .label { font-size: 13px; }
    .data-item .value { font-size: 20px; }
    .data-item .edit-input { width: 80px; font-size: 18px; padding: 8px 10px; -webkit-appearance: none; }
    .btn { padding: 12px 24px; font-size: 15px; width: 100%; text-align: center; }
    .action-bar { flex-direction: column; }
    .data-card { padding: 16px; border-radius: 14px; }
    .data-card h3 { font-size: 13px; }
    .back-link { font-size: 13px; padding: 8px 14px; }
    .history-date { font-size: 13px; padding: 10px 14px; }
    .history-row { padding: 8px 12px; font-size: 12px; gap: 6px; }
    .history-row .h-old, .history-row .h-new { min-width: 35px; }
}
@media (max-width: 380px) {
    .tab-btn { padding: 7px 8px; font-size: 10px; }
    .profile-info h1 { font-size: 18px; }
}
</style>
</head>
<body>
<div class="container">
    <a href="https://smartlife-ao-boso.github.io/fas/" class="back-link" id="backLink">← プランナー一覧に戻る</a>

    <div class="profile-header">
        <div class="profile-avatar" id="avatar"></div>
        <div class="profile-info">
            <h1 id="plannerName">読み込み中...</h1>
            <div class="base-name" id="baseName"></div>
            <div class="badges" id="badges"></div>
        </div>
    </div>

    <div id="saveMsg" class="save-msg"></div>

    <div class="action-bar" id="actionBar">
        <button class="btn btn-primary" onclick="toggleEdit()">編集する</button>
    </div>

    <div id="loadingArea" class="loading">
        <div class="spinner"></div>
        スプレッドシートからデータを読み込み中...
    </div>

    <div id="mainContent" style="display:none;">
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="fas">FAS状況</button>
            <button class="tab-btn" data-tab="win">WIN状況</button>
            <button class="tab-btn" data-tab="asset">アセット実現（当月）</button>
            <button class="tab-btn" data-tab="event">イベント</button>
            <button class="tab-btn" data-tab="appoint">アポイント（当月）</button>
            <button class="tab-btn" data-tab="recruit">人材獲得</button>
            <button class="tab-btn" data-tab="plan">計画生産シート</button>
            <button class="tab-btn" data-tab="history">履歴（単日）</button>
        </div>

        <div class="section active" id="sec-fas">
            <div class="data-card"><h3>FAS状況（累計）</h3><div class="data-grid" id="grid-fas"></div></div>
        </div>
        <div class="section" id="sec-win">
            <div class="data-card"><h3>WIN状況</h3><div class="data-grid" id="grid-win"></div></div>
        </div>
        <div class="section" id="sec-asset">
            <div class="data-card"><h3>アセット実現（当月）</h3><div class="data-grid" id="grid-asset"></div></div>
        </div>
        <div class="section" id="sec-event">
            <div class="data-card"><h3>イベント</h3><div class="data-grid" id="grid-event"></div></div>
        </div>
        <div class="section" id="sec-appoint">
            <div class="data-card"><h3>アポイント（当月）</h3><div class="data-grid" id="grid-appoint"></div></div>
        </div>
        <div class="section" id="sec-recruit">
            <div class="data-card"><h3>人材獲得</h3><div class="data-grid" id="grid-recruit"></div></div>
        </div>
        <div class="section" id="sec-plan">
            <div class="data-card">
                <h3>計画生産シート</h3>
                <div class="plan-upload-box">
                    <div class="plan-row">
                        <input type="text" id="planTitle" class="plan-title-input" placeholder="タイトルを入力（例：不動産業（しごと）の方への提案 / 趣味が◯◯の方への提案）">
                    </div>
                    <div class="plan-row">
                        <label class="plan-file-label" for="planFile">📎 ファイルを選ぶ</label>
                        <input type="file" id="planFile" class="plan-file-input" accept="image/*,application/pdf" onchange="onPlanFilePick()">
                        <span class="plan-file-name" id="planFileName">未選択</span>
                        <button class="btn btn-primary" id="planUploadBtn" onclick="uploadPlan()">アップロード</button>
                    </div>
                    <div class="plan-upload-hint">PDF・画像（最大10MB） / 日付は自動記録されるので、タイトルは計画の内容（対象者・テーマ等）を入れてください</div>
                </div>
                <div class="plan-progress" id="planProgress"></div>
                <div id="planList"><div class="plan-empty">読み込み中...</div></div>
            </div>
        </div>
        <div class="section" id="sec-history">
            <div class="data-card" id="assetSummaryCard" style="display:none; text-align:center; margin-bottom:14px;">
                <h3>当月アセット合計</h3>
                <div style="font-family:'Quicksand',sans-serif; font-size:42px; font-weight:700; color:#4a7cc9; margin:8px 0;" id="assetTotal">0</div>
            </div>
            <div class="data-card"><h3>変更履歴</h3><div id="historyArea"><div class="history-empty">読み込み中...</div></div></div>
        </div>
    </div>
</div>

<script src="site-config.js"></script>
<script src="../../site-config.js"></script>
<script>
var GAS_URL = window.BOSO_GAS_URL || "";

// GASからデータ読み込み（リダイレクト対応）
function loadGAS(url) {
    return fetch(url, { redirect: "follow" }).then(function(r) { return r.json(); });
}

var profile = null;
var sheetData = {};
var editing = false;
var LOCAL_PLANNER_KEY = "boso_fas_planners";

function keyName(name) { return String(name || "").replace(/\s/g, ""); }
function getQueryParam(name) { return new URLSearchParams(location.search).get(name) || ""; }

async function findProfileFromPlannerList(targetName) {
    var lists = [];
    try {
        var raw = localStorage.getItem(LOCAL_PLANNER_KEY);
        if (raw) lists.push(JSON.parse(raw));
    } catch(e) {}
    try {
        var res = await fetch("planners.json");
        if (res.ok) lists.push(await res.json());
    } catch(e) {}
    var targetKey = keyName(targetName);
    for (var li = 0; li < lists.length; li++) {
        var list = lists[li] || [];
        for (var i = 0; i < list.length; i++) {
            if (keyName(list[i].name) === targetKey || keyName(list[i].folder) === targetKey) {
                return {
                    name: list[i].name,
                    base: list[i].base || "",
                    cd: list[i].cd || "",
                    performer: list[i].performer || "",
                    shikaku: list[i].shikaku || 0,
                    emp_id: list[i].emp_id || ""
                };
            }
        }
    }
    return null;
}

// スプレッドシートの項目→カテゴリ分け
var categories = {
    fas: ["担当軒数","担当人数","内一般聴講生軒数","内一般聴講生人数","内専門聴講生軒数","内専門聴講生人数","内ビジネス会員軒数","内ビジネス会員人数","内DX会員軒数","内DX会員人数","内個人事業主","内コミュニティ関係者","内教育関連従事者","内PTA","引継入","引継出","担当増減（先月比）","総デバイス数","他DLPのDX担当軒数"],
    win: ["WIN10使用中（プレ）","11切替済","不要","未確認"],
    asset: ["VC","内AO生","内専門生","内ビジネス","内DXエントリー","内DXレギュラー","CEX","従業員オプション","WEB","GoogleWokSpace","GenSpark","光/SIM/モバイルルータ","我が社"],
    event: ["イベント来館","イベント参加確定","イベント参加予定"],
    appoint: ["アポイントコール数","アポイントラウンド数","アポイント（確定）軒数","アポイント（確定）人数"],
    recruit: ["リファラル","FAS-Z","FAS-Z（学生）"]
};

async function init() {
    // ローカルのdata.jsonからプロフィール読み込み
    var localData = {};
    try {
        var res = await fetch("data.json");
        localData = await res.json();
        profile = localData.profile;
    } catch(e) {
        var queryName = getQueryParam("name");
        profile = await findProfileFromPlannerList(queryName);
        if (!profile) {
            profile = { name: queryName || decodeURIComponent(location.pathname.split("/").slice(-2)[0]), base: "", performer: "", emp_id: "", cd: "" };
        }
    }

    var p = profile;
    document.title = p.name + " - 房総FAS実績";
    document.getElementById("plannerName").textContent = p.name;
    document.getElementById("baseName").textContent = p.base ? p.base + (p.cd ? "（CD: " + p.cd + "）" : "") : "";

    var lastName = p.name.split(" ")[0] || p.name;
    document.getElementById("avatar").textContent = lastName.charAt(0);

    var badges = document.getElementById("badges");
    if (p.performer) {
        var parts = p.performer.split("/");
        for (var i = 0; i < parts.length; i++) {
            var b = document.createElement("span");
            b.className = "badge";
            b.textContent = parts[i];
            badges.appendChild(b);
        }
    }
    if (p.emp_id) {
        var eb = document.createElement("span");
        eb.className = "badge";
        eb.textContent = "ID: " + p.emp_id;
        badges.appendChild(eb);
    }

    // 房総専用GASのURLを設定するまでは、ローカル初期値で表示する
    if (GAS_URL) {
        try {
            var allData = await loadGAS(GAS_URL + "?name=" + encodeURIComponent(p.name.replace(/\s/g, "")));
            var keys = Object.keys(allData);
            if (keys.length > 0) {
                sheetData = allData[keys[0]];
            }
        } catch(e) {
            document.getElementById("loadingArea").innerHTML = '<div class="empty-msg">スプレッドシートに接続できませんでした。ネット接続を確認してください。</div>';
            return;
        }
    } else {
        sheetData = Object.assign({}, localData.fas_status || {}, localData.win_status || {}, localData.asset || {}, localData.event || {}, localData.appointment || {}, localData.recruitment || {});
    }

    document.getElementById("loadingArea").style.display = "none";
    document.getElementById("mainContent").style.display = "block";

    renderCategory("grid-fas", categories.fas);
    renderCategory("grid-win", categories.win);
    renderCategory("grid-asset", categories.asset);
    renderCategory("grid-event", categories.event);
    renderCategory("grid-appoint", categories.appoint);
    renderCategory("grid-recruit", categories.recruit);

    // タブ切替
    document.querySelectorAll(".tab-btn").forEach(function(btn) {
        btn.addEventListener("click", function() {
            document.querySelectorAll(".tab-btn").forEach(function(b) { b.classList.remove("active"); });
            document.querySelectorAll(".section").forEach(function(s) { s.classList.remove("active"); });
            btn.classList.add("active");
            document.getElementById("sec-" + btn.dataset.tab).classList.add("active");
            if (btn.dataset.tab === "history") { loadHistory(); showAssetTotal(); }
            if (btn.dataset.tab === "plan") { loadPlanList(); }
        });
    });
}

// 計画生産シート
function onPlanFilePick() {
    var f = document.getElementById("planFile").files[0];
    document.getElementById("planFileName").textContent = f ? f.name + " (" + Math.round(f.size/1024) + "KB)" : "未選択";
}

function uploadPlan() {
    if (!GAS_URL) { alert("房総専用GAS URLが未設定です"); return; }
    var title = document.getElementById("planTitle").value.trim();
    var fileInput = document.getElementById("planFile");
    var file = fileInput.files[0];
    if (!title) { alert("タイトルを入力してください"); return; }
    if (!file) { alert("ファイルを選択してください"); return; }
    if (file.size > 10 * 1024 * 1024) { alert("10MB以下のファイルにしてください"); return; }

    var btn = document.getElementById("planUploadBtn");
    var progress = document.getElementById("planProgress");
    btn.disabled = true;
    btn.textContent = "送信中...";
    progress.className = "plan-progress show";
    progress.textContent = "アップロード中... ファイルサイズによっては10〜30秒かかります";

    var reader = new FileReader();
    reader.onload = function(ev) {
        var base64 = ev.target.result.split(",")[1];
        fetch(GAS_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({
                action: "plan_upload",
                name: profile.name,
                title: title,
                filename: file.name,
                contentType: file.type,
                data: base64
            })
        }).then(function(r) { return r.json(); }).then(function(result) {
            if (result.status === "ok") {
                document.getElementById("planTitle").value = "";
                fileInput.value = "";
                document.getElementById("planFileName").textContent = "未選択";
                progress.textContent = "アップロード完了";
                setTimeout(function() { progress.className = "plan-progress"; }, 2000);
                loadPlanList();
            } else {
                progress.textContent = "エラー: " + (result.message || "不明");
            }
            btn.disabled = false;
            btn.textContent = "アップロード";
        }).catch(function(e) {
            progress.textContent = "通信エラー: " + e;
            btn.disabled = false;
            btn.textContent = "アップロード";
        });
    };
    reader.onerror = function() {
        progress.textContent = "ファイル読み込みエラー";
        btn.disabled = false;
        btn.textContent = "アップロード";
    };
    reader.readAsDataURL(file);
}

function loadPlanList() {
    var area = document.getElementById("planList");
    if (!GAS_URL) {
        area.innerHTML = '<div class="plan-empty">房総専用GAS URLが未設定です</div>';
        return;
    }
    area.innerHTML = '<div class="plan-empty">読み込み中...</div>';
    var cbName = "onPlanListLoaded_" + Date.now();
    window[cbName] = function(data) {
        delete window[cbName];
        renderPlanList(data);
    };
    var script = document.createElement("script");
    script.src = GAS_URL + "?action=plan_list&name=" + encodeURIComponent(profile.name) + "&callback=" + cbName + "&_=" + Date.now();
    document.body.appendChild(script);
}

function renderPlanList(data) {
    var area = document.getElementById("planList");
    if (!data || data.status !== "ok" || !data.items || data.items.length === 0) {
        area.innerHTML = '<div class="plan-empty">まだ計画生産シートはアップロードされていません</div>';
        return;
    }
    var html = "";
    for (var i = 0; i < data.items.length; i++) {
        var it = data.items[i];
        var isImage = /^image\//.test(it.contentType);
        var viewUrl = "https://drive.google.com/file/d/" + encodeURIComponent(it.fileId) + "/view";
        var thumbUrl = "https://drive.google.com/thumbnail?id=" + encodeURIComponent(it.fileId) + "&sz=w1200";
        html += '<div class="plan-card">';
        html += '<div class="plan-card-title">' + esc(it.title) + '</div>';
        html += '<div class="plan-card-meta"><span>' + esc(it.date) + '</span><span>' + esc(it.filename) + '</span></div>';
        html += '<div class="plan-card-body">';
        if (isImage) {
            html += '<a href="' + viewUrl + '" target="_blank" rel="noopener">'
                + '<img class="plan-card-img" src="' + thumbUrl + '" alt="' + esc(it.title) + '" loading="lazy">'
                + '</a>';
        } else {
            html += '<a class="plan-card-pdf" href="' + viewUrl + '" target="_blank" rel="noopener">'
                + '<span class="pdf-icon">📄</span><span>PDFを開く</span>'
                + '</a>';
        }
        html += '</div>';
        html += '<div style="text-align:right;">'
            + '<button class="plan-card-delete" onclick="deletePlan(\'' + esc(it.fileId) + '\', \'' + esc(it.title).replace(/'/g, "&#39;") + '\')">削除</button>'
            + '</div>';
        html += '</div>';
    }
    area.innerHTML = html;
}

function deletePlan(fileId, title) {
    if (!GAS_URL) { alert("房総専用GAS URLが未設定です"); return; }
    if (!confirm("「" + title + "」を削除しますか？この操作は取り消せません。")) return;
    var cbName = "onPlanDeleted_" + Date.now();
    window[cbName] = function(data) {
        delete window[cbName];
        if (data && data.status === "ok") {
            loadPlanList();
        } else {
            alert("削除エラー: " + (data && data.message ? data.message : "不明"));
        }
    };
    var script = document.createElement("script");
    script.src = GAS_URL + "?action=plan_delete&name=" + encodeURIComponent(profile.name)
        + "&fileId=" + encodeURIComponent(fileId) + "&callback=" + cbName + "&_=" + Date.now();
    document.body.appendChild(script);
}

function renderCategory(gridId, items) {
    var grid = document.getElementById(gridId);
    grid.innerHTML = "";
    for (var i = 0; i < items.length; i++) {
        var key = items[i];
        var val = sheetData[key] !== undefined ? sheetData[key] : 0;
        if (typeof val === "string") {
            val = val.replace(/[０-９]/g, function(s) { return String.fromCharCode(s.charCodeAt(0) - 0xFEE0); });
            val = parseInt(val) || 0;
        }
        var item = document.createElement("div");
        item.className = "data-item";
        item.innerHTML = '<span class="label">' + key + '</span>' +
            '<span class="value ' + (val === 0 ? "zero" : "") + '">' + val + '</span>' +
            '<input class="edit-input" type="number" value="' + val + '" data-key="' + key + '">';
        grid.appendChild(item);
    }
}

function toggleEdit() {
    editing = !editing;
    var cards = document.querySelectorAll(".data-card");
    cards.forEach(function(c) { c.classList.toggle("edit-mode", editing); });
    var bar = document.getElementById("actionBar");
    if (editing) {
        bar.innerHTML = '<button class="btn btn-primary" id="saveBtn" onclick="saveData()">保存する</button>' +
            '<button class="btn btn-danger" onclick="cancelEdit()">キャンセル</button>';
    } else {
        bar.innerHTML = '<button class="btn btn-primary" onclick="toggleEdit()">編集する</button>';
    }
}

function cancelEdit() {
    editing = false;
    document.querySelectorAll(".data-card").forEach(function(c) { c.classList.remove("edit-mode"); });
    renderCategory("grid-fas", categories.fas);
    renderCategory("grid-win", categories.win);
    renderCategory("grid-asset", categories.asset);
    renderCategory("grid-event", categories.event);
    renderCategory("grid-appoint", categories.appoint);
    renderCategory("grid-recruit", categories.recruit);
    document.getElementById("actionBar").innerHTML = '<button class="btn btn-primary" onclick="toggleEdit()">編集する</button>';
    document.getElementById("saveMsg").className = "save-msg";
    document.getElementById("saveMsg").textContent = "";
}

async function saveData() {
    if (!GAS_URL) {
        document.getElementById("saveMsg").className = "save-msg err";
        document.getElementById("saveMsg").textContent = "房総専用GAS URLが未設定です";
        return;
    }
    var changes = {};
    var changeCount = 0;
    document.querySelectorAll(".edit-input").forEach(function(input) {
        var key = input.dataset.key;
        var newVal = Number(input.value) || 0;
        var oldVal = sheetData[key] !== undefined ? (parseInt(sheetData[key]) || 0) : 0;
        if (newVal !== oldVal) {
            changes[key] = newVal;
            changeCount++;
        }
    });

    if (changeCount === 0) {
        document.getElementById("saveMsg").className = "save-msg ok";
        document.getElementById("saveMsg").textContent = "変更はありません";
        return;
    }

    var saveBtn = document.getElementById("saveBtn");
    saveBtn.disabled = true;
    saveBtn.textContent = "送信中...";

    try {
        var saveUrl = GAS_URL + "?action=save&name=" + encodeURIComponent(profile.name) + "&data=" + encodeURIComponent(JSON.stringify(changes));
        var result = await loadGAS(saveUrl);

        if (result.status === "ok") {
            for (var key in changes) {
                sheetData[key] = changes[key];
            }
            document.getElementById("saveMsg").className = "save-msg ok";
            document.getElementById("saveMsg").textContent = changeCount + "件の変更をスプレッドシートに保存しました";
            toggleEdit();
            renderCategory("grid-fas", categories.fas);
            renderCategory("grid-win", categories.win);
            renderCategory("grid-asset", categories.asset);
            renderCategory("grid-event", categories.event);
            renderCategory("grid-appoint", categories.appoint);
            renderCategory("grid-recruit", categories.recruit);
        } else {
            document.getElementById("saveMsg").className = "save-msg err";
            document.getElementById("saveMsg").textContent = "保存エラー: " + (result.message || "不明なエラー");
            saveBtn.disabled = false;
            saveBtn.textContent = "保存する";
        }
    } catch(e) {
        document.getElementById("saveMsg").className = "save-msg err";
        document.getElementById("saveMsg").textContent = "通信エラー: ネット接続を確認してください";
        saveBtn.disabled = false;
        saveBtn.textContent = "保存する";
    }
}

// 履歴タブクリック時にログ読み込み
function showAssetTotal() {
    var total = 0;
    for (var i = 0; i < categories.asset.length; i++) {
        var val = sheetData[categories.asset[i]];
        total += Number(val) || 0;
    }
    document.getElementById("assetTotal").textContent = total;
    document.getElementById("assetSummaryCard").style.display = "block";
}

var historyLoaded = false;
function loadHistory() {
    if (historyLoaded || !profile) return;
    historyLoaded = true;
    if (!GAS_URL) {
        document.getElementById("historyArea").innerHTML = '<div class="history-empty">房総専用GAS URLが未設定です</div>';
        return;
    }
    var script = document.createElement("script");
    script.src = GAS_URL + "?action=mylog&name=" + encodeURIComponent(profile.name) + "&callback=onMyLogLoaded&_=" + Date.now();
    document.body.appendChild(script);
}

function formatDateLabel(dateStr) {
    var youbi = ["日","月","火","水","木","金","土"];
    var d = new Date(dateStr);
    if (isNaN(d.getTime())) {
        var parts = dateStr.split("/");
        d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    }
    return (d.getMonth() + 1) + "/" + d.getDate() + "（" + youbi[d.getDay()] + "）";
}

function getDateKey(dateStr) {
    var d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr.split(" ")[0];
    return d.getFullYear() + "/" + ("0"+(d.getMonth()+1)).slice(-2) + "/" + ("0"+d.getDate()).slice(-2);
}

function onMyLogLoaded(data) {
    var area = document.getElementById("historyArea");
    if (!data || data.status === "error" || !data.logs || data.logs.length === 0) {
        area.innerHTML = '<div class="history-empty">まだ変更履歴がありません</div>';
        return;
    }
    // 初回の累計データ（oldVal===newVal）はoldValを0にする、0→0は非表示
    var seen = {};
    var changed = [];
    for (var i = 0; i < data.logs.length; i++) {
        var log = data.logs[i];
        if (Number(log.oldVal) === 0 && Number(log.newVal) === 0) continue;
        if (!seen[log.item]) {
            seen[log.item] = true;
            if (String(log.oldVal) === String(log.newVal)) {
                log.oldVal = 0;
            }
        }
        changed.push(log);
    }
    if (changed.length === 0) {
        area.innerHTML = '<div class="history-empty">まだ変更履歴がありません</div>';
        return;
    }
    // 日付ごとにグループ化（同日同項目は最新のみ）
    var groups = {};
    for (var i = 0; i < changed.length; i++) {
        var log = changed[i];
        var dateKey = getDateKey(log.date);
        if (!groups[dateKey]) groups[dateKey] = {};
        groups[dateKey][log.item] = log;
    }
    // オブジェクトを配列に変換
    for (var dk in groups) {
        var items = [];
        for (var key in groups[dk]) items.push(groups[dk][key]);
        groups[dk] = items;
    }
    // 日付を古い順→新しい順にソート（古い順で初回判定、表示は新しい順）
    var assetItems = {};
    for (var a = 0; a < categories.asset.length; a++) assetItems[categories.asset[a]] = true;
    var dates = Object.keys(groups).sort();
    var isFirst = true;
    var dailyAsset = {};
    for (var d = 0; d < dates.length; d++) {
        var date = dates[d];
        var items = groups[date];
        var assetDiff = 0;
        for (var j = 0; j < items.length; j++) {
            var it = items[j];
            if (assetItems[it.item] && !isFirst) {
                assetDiff += (Number(it.newVal) || 0) - (Number(it.oldVal) || 0);
            }
        }
        dailyAsset[date] = isFirst ? "累計" : assetDiff;
        isFirst = false;
    }
    dates.reverse();
    var html = "";
    for (var d = 0; d < dates.length; d++) {
        var date = dates[d];
        var items = groups[date];
        var label = formatDateLabel(date);
        var assetLabel = dailyAsset[date] === "累計" ? "累計初期値" : "当日アセット件数 " + dailyAsset[date];
        html += '<div class="history-group">';
        html += '<div class="history-date" onclick="toggleHistory(this)"><span>' + label + '  ' + assetLabel + '</span><span class="arrow">▶</span></div>';
        html += '<div class="history-items">';
        for (var j = 0; j < items.length; j++) {
            var it = items[j];
            html += '<div class="history-row">'
                + '<span class="h-item">' + esc(it.item) + '</span>'
                + '<span class="h-old">' + esc(String(it.oldVal)) + '</span>'
                + '<span class="h-arrow">→</span>'
                + '<span class="h-new">' + esc(String(it.newVal)) + '</span>'
                + '</div>';
        }
        html += '</div></div>';
    }
    area.innerHTML = html;
    // 最新の日付を自動で開く
    var first = area.querySelector('.history-date');
    if (first) toggleHistory(first);
}

function toggleHistory(el) {
    el.classList.toggle("open");
    var items = el.nextElementSibling;
    items.classList.toggle("open");
}

function esc(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
}

init();
</script>
